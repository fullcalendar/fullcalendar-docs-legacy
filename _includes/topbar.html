<div class='topbar'>
  <div class='topbar__container container'>

    <div class='topbar__branding'>
      <a class='branding' href='{{ site.fullcalendar_url }}'>
        <div class='branding-graphic'></div>
        <div class='branding-text'>FullCalendar</div>
      </a>
    </div>

    <div class='topbar__nav'>
      <div class='topbar__nav-item {%
        if page.is_docs
      %}topbar__nav-item--selected{%
        endif
      %}'>
        <a class='topbar__nav-handle' href='/'>
          Docs
        </a>
      </div>
      <div class='topbar__nav-item {%
        if page.is_community
      %}topbar__nav-item--selected{%
        endif
      %}'>
        <div class='topbar__nav-handle'>
          Support
        </div>
        <div class='topbar__flyout-wrap'>
          <div class='topbar__flyout'>
            <div class='topbar__flyout-item'>
              <a class='topbar__flyout-handle' href='{{ site.fullcalendar_url }}/getting-help'>
                Getting Help
              </a>
            </div>
            <div class='topbar__flyout-item'>
              <a class='topbar__flyout-handle' href='{{ site.fullcalendar_url }}/reporting-bugs'>
                Reporting Bugs
              </a>
            </div>
            <div class='topbar__flyout-item'>
              <a class='topbar__flyout-handle' href='{{ site.fullcalendar_url }}/requesting-features'>
                Requesting Features
              </a>
            </div>
            <div class='topbar__flyout-item'>
              <a class='topbar__flyout-handle' href='{{ site.fullcalendar_url }}/contributing'>
                Contributing
              </a>
            </div>
          </div>
        </div>
      </div>
      <div class='topbar__nav-item'>
        <a class='topbar__nav-handle button button--lightblue button--outlined' href='{{ site.fullcalendar_url }}/pricing'>
          Pricing
        </a>
      </div>
    </div>

    <div class='topbar__notice'>
      <a class='topbar__notice-link' href='https://github.com/fullcalendar/fullcalendar/releases' target='_blank'>
        <span style="color: #FAC863">Latest:</span>&nbsp;
        v{{ site.data.latest-releases.v6 }}
      </a>
      {% comment %}
        <a class='topbar__notice-link' href='https://github.com/fullcalendar/fullcalendar/issues/7907' target='_blank'>
          <span style="color: #FAC863">Mar 28th</span> &mdash;
          v7 delayed for more features
        </a>
      {% endcomment %}
    </div>

    <div class='topbar__github'>
      <a class='topbar__github-link' href='{{ site.fullcalendar_repo }}' target='_blank'>
        <div class='topbar__github-graphic'></div>
      </a>
    </div>

  </div>
</div>
